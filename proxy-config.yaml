# proxy-config.yaml
apiVersion: apigeeregistry/v1
kind: Proxy
metadata:
  name: my-proxy
spec:
  basePath: /my-proxy
  targets:
    - name: default
      url: https://example.com
  policies:
    - name: AddHeader
      type: AssignMessage
      config:
        headers:
          - name: X-Custom-Header
            value: HelloWorld