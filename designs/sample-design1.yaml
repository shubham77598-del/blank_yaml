apigee:
  name: sample
  sharedFlows:
    - name: common-logging
      policies:
        - name: Verify-API-Key
          type: VerifyAPIKey
          configuration:
            keyLocation: request.header.x-api-key
        - name: LogPolicy
          type: MessageLogging
          configuration:
            logLevel: DEBUG
  proxies:
    - name: sample-api
      description: "Sample API"
      basePath: /v1/sample
      target: https://mocktarget.apigee.net
      dependsOn:
        sharedFlows:
          - common-logging
      policies:
        - name: QuotaPolicy
          type: Quota
          configuration:
            limit: 500
            timeUnit: minute
      flows:
        - name: default
          condition: true
          request:
            - policy: Verify-API-Key
            - policy: LogPolicy
            - policy: QuotaPolicy
  apiProducts:
    - name: SampleProduct
      displayName: Sample Product
      approvalType: AUTO
      proxies:
        - sample-api
      environments:
        - ${APIGEE_ENV}
      quota:
        limit: 1000
        interval: 1
        timeUnit: minute