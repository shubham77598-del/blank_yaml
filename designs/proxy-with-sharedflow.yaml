apigee:
  name: "sample-api-design"
  version: "1.0"
  sharedFlows:
    - name: "common-security"
      description: "Common security policies for all APIs"
      policies:
        - name: "Verify-API-Key"
          type: "VerifyAPIKey"
          configuration:
            enabled: true
            continueOnError: false
            keyLocation: "request.header.x-api-key"
    - name: "common-logging"
      description: "Common logging policies for all APIs"
      policies:
        - name: "Message-Logging"
          type: "MessageLogging"
          configuration:
            logLevel: "INFO"
            logToStdout: true
  proxies:
    - name: "sample-api"
      basePath: "/v1/sample"
      target: "https://mocktarget.apigee.net"
      dependencies:
        sharedFlows: ["common-security", "common-logging"]
      policies:
        - name: "Quota"
          type: "Quota"
          configuration:
            limit: 1000
            timeUnit: "minute"
      flows:
        - name: "default"
          condition: "true"
          request:
            - policy: "Verify-API-Key"
            - policy: "Quota"
            - policy: "Message-Logging"
      endpointSecurity:
        oauthV2:
          enabled: true
