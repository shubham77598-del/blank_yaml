---
proxies:
  - name: customer-api
    basePath: /v1/customers
    description: Customer API with basic policies
    policies:
      - name: verify-api-key
        type: VerifyAPIKey
        displayName: Verify API Key
        configuration:
          apiKey: request.queryparam.apikey
      - name: quota-limit
        type: Quota
        displayName: Rate Limit
        configuration:
          limit: 100
          timeUnit: minute
    endpoints:
      - name: default
        type: proxy
        basePath: /v1/customers
        flows:
          - name: get-customers
            condition: request.verb == "GET"
            request:
              - policy: verify-api-key
              - policy: quota-limit
    targetEndpoints:
      - name: default
        url: https://api.example.com/customers