apigee:
  name: sample
  sharedFlows:
    - name: common-logging
      policies:
        - name: Verify-API-Key
          type: VerifyAPIKey
          configuration:
            keyLocation: request.header.x-api-key
  proxies:
    - name: sample-proxy
      basePath: /v1/sample
      target: https://mocktarget.apigee.net
      description: Sample proxy generated from design
      dependsOn:
        sharedFlows:
          - common-logging
      policies:
        - name: QuotaPolicy
          type: Quota
          configuration:
            limit: 500
            timeUnit: minute
      flows:
        - name: default
          condition: true
          request:
            - policy: Verify-API-Key
            - policy: QuotaPolicy
  apiProducts:
    - name: SampleProduct
      displayName: Sample Product
      proxies:
        - sample-proxy
      environments:
        - eval
      approvalType: AUTO
      quota:
        limit: 1000
        interval: 1
        timeUnit: minute
