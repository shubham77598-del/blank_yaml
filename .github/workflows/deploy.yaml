# .github/workflows/deploy.yaml
name: Deploy Apigee Proxy from YAML

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Path to proxy YAML config'
        required: true
        default: 'proxy-config.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: apigee

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Define & pin your desired CLI version
      - name: Set Apigee CLI version
        id: pin
        run: |
          # Change this to the version you trust
          echo "apigeecli_version=v2.14.0" >> $GITHUB_OUTPUT

      # Step 2: Cache the CLI zip & extracted directory
      - name: Cache Apigee CLI
        uses: actions/cache@v3
        with:
          # We cache the entire versioned folder under ~/.cache/apigeecli
          path: ~/.cache/apigeecli
          key: apigeecli-${{ runner.os }}-${{ steps.pin.outputs.apigeecli_version }}

      # Step 3: Install or restore from cache
      - name: Install Apigee CLI
        run: |
          VERSION=${{ steps.pin.outputs.apigeecli_version }}
          CACHE_DIR="$HOME/.cache/apigeecli/$VERSION"

          if [ -f "$CACHE_DIR/apigeecli" ]; then
            echo "🗄️  Restoring cached Apigee CLI $VERSION"
          else
            echo "⬇️  Downloading Apigee CLI $VERSION"
            ZIP_NAME="apigeecli_${VERSION}_Linux_x86_64.zip"
            URL="https://github.com/apigee/apigeecli/releases/download/${VERSION}/${ZIP_NAME}"
            mkdir -p "$CACHE_DIR"
            curl -sL -o "$ZIP_NAME" "$URL"
            unzip -q -d "$CACHE_DIR" "$ZIP_NAME"
            rm "$ZIP_NAME"
            chmod +x "$CACHE_DIR/apigeecli"
          fi

          echo "📦 Installing into /usr/local/bin"
          sudo cp "$CACHE_DIR/apigeecli" /usr/local/bin/apigeecli

          echo "🔍 Verifying installation"
          apigeecli version

      - name: Validate Secrets
        env:
          APIGEE_ORG:   ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV:   ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ secrets.APIGEE_TOKEN }}
        run: |
          for var in APIGEE_ORG APIGEE_ENV APIGEE_TOKEN; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing $var"
              exit 1
            fi
          done

      - name: Deploy Proxy from YAML
        env:
          APIGEE_ORG:   ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV:   ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ secrets.APIGEE_TOKEN }}
        run: |
          apigeecli apply \
            -f "${{ github.event.inputs.config_file }}" \
            --org "$APIGEE_ORG" \
            --env "$APIGEE_ENV" \
            --token "$APIGEE_TOKEN"
