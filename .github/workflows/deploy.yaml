name: Deploy Apigee Proxy from YAML

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: 'Path to proxy YAML config'
        required: true
        default: 'proxy-config.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: apigee

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apigee CLI
        run: |
          # 1. Get the download URL for the latest Linux 64-bit ZIP
          DOWNLOAD_URL=$(
            curl -s https://api.github.com/repos/apigee/apigeecli/releases/latest \
            | grep browser_download_url \
            | grep Linux_x86_64.zip \
            | head -n1 \
            | cut -d '"' -f4
          )
          echo "Downloading Apigee CLI from $DOWNLOAD_URL"
          # 2. Download, unzip, make executable, and move to PATH
          curl -sL -o apigeecli.zip "$DOWNLOAD_URL"
          unzip -o apigeecli.zip
          chmod +x apigeecli
          sudo mv apigeecli /usr/local/bin/
          # 3. Confirm it works
          apigeecli version

      - name: Validate Secrets
        env:
          APIGEE_ORG:   ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV:   ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ secrets.APIGEE_TOKEN }}
        run: |
          for var in APIGEE_ORG APIGEE_ENV APIGEE_TOKEN; do
            if [[ -z "${!var}" ]]; then
              echo "::error::Missing $var"
              exit 1
            fi
          done

      - name: Deploy Proxy from YAML
        env:
          APIGEE_ORG:   ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV:   ${{ secrets.APIGEE_ENV }}
          APIGEE_TOKEN: ${{ secrets.APIGEE_TOKEN }}
        run: |
          apigeecli apply -f "${{ github.event.inputs.config_file }}" \
            --org "$APIGEE_ORG" \
            --env "$APIGEE_ENV" \
            --token "$APIGEE_TOKEN"
