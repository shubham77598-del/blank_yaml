name: Apigee Design Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment: apigee

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: 8
          distribution: temurin
          cache: maven

      - name: Write Service Account Key
        run: |
          echo "${{ secrets.APIGEE_SA_KEY }}" > sa.json
          echo "APIGEE_SA_KEY_FILE=$PWD/sa.json" >> $GITHUB_ENV

      - name: Run Design Generator
        run: |
          mvn -q -DskipTests compile exec:java -Dexec.mainClass="com.apigee.designparser.DesignParser"
          echo "Generated structure:"
          find generated -maxdepth 5 -type f -name "*.xml" || true

      - name: Deploy Shared Flows
        run: |
          if [ -d generated/sharedFlows ]; then
            for sf in generated/sharedFlows/* ; do
              [ -d "$sf" ] || continue
              echo "::group::Deploy Shared Flow $(basename "$sf")"
              (cd "$sf" && mvn -q -DskipTests install \
                -Dapigee.org="${{ secrets.APIGEE_ORG }}" \
                -Dapigee.env="${{ secrets.APIGEE_ENV }}" \
                -DserviceAccountFile="$PWD/sa.json")
              echo "::endgroup::"
            done
          else
            echo "No shared flows generated"
          fi

      - name: Deploy Proxies
        run: |
          if [ -d generated/proxies ]; then
            for px in generated/proxies/* ; do
              [ -d "$px" ] || continue
              echo "::group::Deploy Proxy $(basename "$px")"
              (cd "$px" && mvn -q -DskipTests install \
                -Dapigee.org="${{ secrets.APIGEE_ORG }}" \
                -Dapigee.env="${{ secrets.APIGEE_ENV }}" \
                -DserviceAccountFile="$PWD/sa.json")
              echo "::endgroup::"
            done
          else
            echo "No proxies generated"
          fi

      - name: Upload Generated Bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigee-generated
          path: generated/