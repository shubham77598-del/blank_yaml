name: Deploy Apigee Components

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: apigee
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        version: 'latest'
        
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.APIGEE_SA_KEY }}
        
    - name: Get Apigee access token
      id: auth
      run: |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        echo "token=${ACCESS_TOKEN}" >> $GITHUB_OUTPUT
      
    - name: Process YAML design files
      run: |
        mvn compile exec:java -Dexec.mainClass="com.example.DesignParser"
      
    - name: Deploy Shared Flows first
      run: |
        if [ -d "target/sharedflows" ]; then
          echo "Checking for shared flows to deploy..."
          FOUND_FLOWS=false
          
          for d in target/sharedflows/*/; do
            if [ -d "$d" ]; then
              FOUND_FLOWS=true
              echo "Deploying shared flow: $(basename "$d")"
              
              cd "$d"
              mvn clean install \
                -Dapigee.org=${{ secrets.APIGEE_ORG }} \
                -Dapigee.env=${{ secrets.APIGEE_ENV }} \
                -Dapigee.username=x \
                -Dapigee.password=x \
                -Dbearer=${{ steps.auth.outputs.token }} \
                -Dapigee.config.options=update
              
              RESULT=$?
              if [ $RESULT -ne 0 ]; then
                echo "Shared flow deployment failed, exiting"
                exit $RESULT
              fi
              cd - > /dev/null
            fi
          done
          
          if [ "$FOUND_FLOWS" = false ]; then
            echo "No shared flow directories found in target/sharedflows/"
          fi
        else
          echo "No shared flows directory found. Skipping shared flow deployment."
        fi
      
    - name: Deploy API Proxies
      if: success()
      run: |
        if [ -d "target/proxies" ]; then
          echo "Checking for API proxies to deploy..."
          FOUND_PROXIES=false
          
          for d in target/proxies/*/; do
            if [ -d "$d" ]; then
              FOUND_PROXIES=true
              echo "Deploying proxy: $(basename "$d")"
              
              cd "$d"
              mvn clean install \
                -Dapigee.org=${{ secrets.APIGEE_ORG }} \
                -Dapigee.env=${{ secrets.APIGEE_ENV }} \
                -Dapigee.username=x \
                -Dapigee.password=x \
                -Dbearer=${{ steps.auth.outputs.token }} \
                -Dapigee.config.options=update
              
              RESULT=$?
              if [ $RESULT -ne 0 ]; then
                echo "Proxy deployment failed"
                exit $RESULT
              fi
              cd - > /dev/null
            fi
          done
          
          if [ "$FOUND_PROXIES" = false ]; then
            echo "No proxy directories found in target/proxies/"
          fi
        else
          echo "No proxies directory found. Skipping proxy deployment."
        fi

    - name: Upload artifacts
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: apigee-bundles
        path: |
          target/
          !target/classes/
          !target/generated-sources/