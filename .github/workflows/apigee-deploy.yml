name: Deploy Apigee Components

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'
        cache: maven

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v0.2.1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.APIGEE_SA_KEY }}
        export_default_credentials: true

    - name: Get Apigee access token
      id: auth
      run: |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        echo "::set-output name=token::${ACCESS_TOKEN}"
      
    - name: Process YAML design files
      run: |
        mvn compile exec:java -Dexec.mainClass="com.example.DesignParser"
      
    - name: Deploy Shared Flows first
      run: |
        cd target/sharedflows
        if [ -d "*" ]; then
          for d in */; do
            cd "$d"
            echo "Deploying shared flow: $(basename "$d")"
            mvn clean install -Papigee-deploy \
              -Dapigee.org=${{ secrets.APIGEE_ORG }} \
              -Dapigee.env=${{ secrets.APIGEE_ENV }} \
              -Dbearer=${{ steps.auth.outputs.token }}
            cd ..
          done
        else
          echo "No shared flows to deploy"
        fi
      
    - name: Deploy API Proxies
      run: |
        cd target/proxies
        if [ -d "*" ]; then
          for d in */; do
            cd "$d"
            echo "Deploying proxy: $(basename "$d")"
            mvn clean install -Papigee-deploy \
              -Dapigee.org=${{ secrets.APIGEE_ORG }} \
              -Dapigee.env=${{ secrets.APIGEE_ENV }} \
              -Dbearer=${{ steps.auth.outputs.token }}
            cd ..
          done
        else
          echo "No proxies to deploy"
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: apigee-bundles
        path: target/