name: Deploy Apigee Components

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: apigee

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Write Service Account Key to file
        # We need a file path for apigee-edge-maven-plugin's serviceAccountFile
        run: |
          echo "${{ secrets.APIGEE_SA_KEY }}" > sa.json
          echo "APIGEE_SA_KEY_FILE=$PWD/sa.json" >> $GITHUB_ENV

      - name: Build generator & run design parser
        run: |
          mvn -q -e -DskipTests compile exec:java -Dexec.mainClass="com.example.DesignParser"
          echo "Generated bundles:"
          find generated -maxdepth 4 -type f -name "*.xml" || true

      - name: Deploy Shared Flows
        run: |
          if [ -d generated/sharedflows ]; then
            for sf in generated/sharedflows/* ; do
              if [ -d "$sf" ]; then
                echo "::group::Deploy Shared Flow $(basename "$sf")"
                (cd "$sf" && mvn -q -DskipTests install)
                echo "::endgroup::"
              fi
            done
          else
            echo "No sharedflows generated"
          fi

      - name: Deploy Proxies
        run: |
          if [ -d generated/proxies ]; then
            for px in generated/proxies/* ; do
              if [ -d "$px" ]; then
                echo "::group::Deploy Proxy $(basename "$px")"
                (cd "$px" && mvn -q -DskipTests install)
                echo "::endgroup::"
              fi
            done
          else
            echo "No proxies generated"
          fi

      - name: (Optional) Commit generated bundles back
        if: always()
        env:
          GIT_COMMIT_AUTHOR: "automation-bot"
        run: |
          if [ -n "$(git status --porcelain generated)" ]; then
            git config user.name "$GIT_COMMIT_AUTHOR"
            git config user.email "bot@users.noreply.github.com"
            git add generated
            git commit -m "chore: update generated Apigee bundles [ci skip]" || true
            git push || echo "Non-fast-forward (race), skip push."
          else
            echo "No changes in generated/ to commit."
          fi

      - name: Upload bundles artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigee-bundles
            # Upload only generated outputs (avoid full target noise)
          path: generated/