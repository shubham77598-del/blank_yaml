name: Apigee Design Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment: apigee

    env:
      # Expose secrets as simple env vars (not strictly required if using only -D, but useful)
      APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
      APIGEE_ENV: ${{ secrets.APIGEE_ENV }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Write Service Account Key
        run: |
            echo "${{ secrets.APIGEE_SA_KEY }}" > sa.json
            echo "APIGEE_SA_KEY_FILE=$PWD/sa.json" >> $GITHUB_ENV

      - name: Run Design Generator
        run: |
          mvn -q -DskipTests compile exec:java -Dexec.mainClass="com.company.design.DesignParser"
          echo "Generated structure:"
          find generated -maxdepth 5 -type f -name "*.xml" | sed 's/^/  /' || true

      - name: Deploy Shared Flows
        run: |
          set -e
          if [ -d generated/sharedflows ]; then
            for sf in generated/sharedflows/* ; do
              [ -d "$sf" ] || continue
              echo "::group::Deploy Shared Flow $(basename "$sf")"
              (cd "$sf" && mvn -q -DskipTests install \
                -Dapigee.org="$APIGEE_ORG" \
                -Dapigee.env="$APIGEE_ENV" \
                -DserviceAccountFile="$APIGEE_SA_KEY_FILE")
              echo "::endgroup::"
            done
          else
            echo "No sharedflows generated"
          fi

      - name: Deploy Proxies
        run: |
          set -e
          if [ -d generated/proxies ]; then
            for px in generated/proxies/* ; do
              [ -d "$px" ] || continue
              echo "::group::Deploy Proxy $(basename "$px")"
              (cd "$px" && mvn -q -DskipTests install \
                -Dapigee.org="$APIGEE_ORG" \
                -Dapigee.env="$APIGEE_ENV" \
                -DserviceAccountFile="$APIGEE_SA_KEY_FILE")
              echo "::endgroup::"
            done
          else
            echo "No proxies generated"
          fi

      - name: Upload Generated Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apigee-generated
          path: generated/