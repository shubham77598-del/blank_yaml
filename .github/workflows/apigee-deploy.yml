name: Apigee X Design-Driven Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**.yaml'

jobs:
  build-and-deploy-to-apigee:
    runs-on: ubuntu-latest
    environment: apigee
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML Files
        run: yamllint designs/

      - name: Set up JDK for Maven
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <profiles>
              <profile>
                <id>apigee</id>
                <repositories>
                  <repository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </repository>
                  <repository>
                    <id>apigee-releases</id>
                    <url>https://repository.sonatype.org/content/repositories/central</url>
                  </repository>
                </repositories>
                <pluginRepositories>
                  <pluginRepository>
                    <id>central</id>
                    <url>https://repo.maven.apache.org/maven2</url>
                  </pluginRepository>
                  <pluginRepository>
                    <id>apigee-releases</id>
                    <url>https://repository.sonatype.org/content/repositories/central</url>
                  </pluginRepository>
                </pluginRepositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>apigee</activeProfile>
            </activeProfiles>
          </settings>
          EOF

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.APIGEE_SA_KEY }}'

      - name: Get Google Cloud Access Token
        id: get_token
        run: echo "APIGEE_TOKEN=$(gcloud auth print-access-token)" >> $GITHUB_ENV

      - name: Set Apigee Org and Env for Maven
        run: |
          echo "APIGEE_ORG=${{ secrets.APIGEE_ORG }}" >> $GITHUB_ENV
          echo "APIGEE_ENV=${{ secrets.APIGEE_ENV }}" >> $GITHUB_ENV

      - name: Debug Maven Settings
        run: |
          echo "Maven will use the following settings:"
          echo "APIGEE_ORG: $APIGEE_ORG"
          echo "APIGEE_ENV: $APIGEE_ENV"
          echo "Access token is available: ${{ env.APIGEE_TOKEN != '' }}"
          
      - name: Create Java source directories if needed
        run: |
          mkdir -p src/main/java/com/example
          
          # Create a simple DesignParser class if it doesn't exist
          if [ ! -f "src/main/java/com/example/DesignParser.java" ]; then
            cat > src/main/java/com/example/DesignParser.java << 'EOF'
            package com.example;
            
            import org.yaml.snakeyaml.Yaml;
            import java.io.File;
            import java.io.FileInputStream;
            import java.nio.file.Files;
            import java.nio.file.Paths;
            import java.util.Map;
            
            public class DesignParser {
                public static void main(String[] args) {
                    try {
                        System.out.println("Starting YAML design parsing...");
                        
                        // Create target directories
                        Files.createDirectories(Paths.get("target/apiproxies"));
                        Files.createDirectories(Paths.get("target/sharedflows"));
                        
                        // Load and parse all YAML files in the designs directory
                        File designsDir = new File("designs");
                        if (designsDir.exists() && designsDir.isDirectory()) {
                            for (File yamlFile : designsDir.listFiles((dir, name) -> name.endsWith(".yaml"))) {
                                System.out.println("Processing " + yamlFile.getName());
                                
                                Yaml yaml = new Yaml();
                                Map<String, Object> data = yaml.load(new FileInputStream(yamlFile));
                                
                                // Process shared flows first
                                if (data.containsKey("sharedFlows")) {
                                    System.out.println("Found shared flows, processing...");
                                    // In a real implementation, generate shared flow bundles here
                                }
                                
                                // Process proxies second
                                if (data.containsKey("proxies")) {
                                    System.out.println("Found API proxies, processing...");
                                    // In a real implementation, generate API proxy bundles here
                                }
                            }
                        }
                        
                        System.out.println("YAML design parsing completed.");
                    } catch (Exception e) {
                        e.printStackTrace();
                        System.exit(1);
                    }
                }
            }
            EOF
          fi

      - name: Install specific version of Maven Apigee plugin
        run: |
          # Download the apigee-deploy-maven-plugin repo which has the correct plugin
          git clone https://github.com/apigee/apigee-deploy-maven-plugin.git
          cd apigee-deploy-maven-plugin
          mvn clean install -DskipTests
          cd ..

      - name: Build and Deploy to Apigee X
        run: mvn clean install -P apigee -Dapigee.options=update