name: Deploy Apigee Components

on:
  push:
    branches: [ main ]
    paths:
      - 'designs/**'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.APIGEE_SA_KEY }}
        export_default_credentials: true

    - name: Get Apigee access token
      id: auth
      run: |
        ACCESS_TOKEN=$(gcloud auth print-access-token)
        echo "token=${ACCESS_TOKEN}" >> $GITHUB_OUTPUT
      
    - name: Process YAML design files
      run: |
        mvn compile exec:java -Dexec.mainClass="com.example.DesignParser"
      
    - name: Deploy Shared Flows first
      run: |
        cd target/sharedflows
        if [ -d "*" ]; then
          for d in */; do
            if [ -d "$d" ]; then
              cd "$d"
              echo "Deploying shared flow: $(basename "$d")"
              mvn clean install -Papigee-deploy \
                -Dapigee.org=${{ secrets.APIGEE_ORG }} \
                -Dapigee.env=${{ secrets.APIGEE_ENV }} \
                -Dbearer=${{ steps.auth.outputs.token }}
              RESULT=$?
              if [ $RESULT -ne 0 ]; then
                echo "Shared flow deployment failed, exiting"
                exit $RESULT
              fi
              cd ..
            fi
          done
        else
          echo "No shared flows to deploy"
        fi
      
    - name: Deploy API Proxies
      if: success()
      run: |
        cd target/proxies
        if [ -d "*" ]; then
          for d in */; do
            if [ -d "$d" ]; then
              cd "$d"
              echo "Deploying proxy: $(basename "$d")"
              mvn clean install -Papigee-deploy \
                -Dapigee.org=${{ secrets.APIGEE_ORG }} \
                -Dapigee.env=${{ secrets.APIGEE_ENV }} \
                -Dbearer=${{ steps.auth.outputs.token }}
              RESULT=$?
              if [ $RESULT -ne 0 ]; then
                echo "Proxy deployment failed"
                exit $RESULT
              fi
              cd ..
            fi
          done
        else
          echo "No proxies to deploy"
        fi

    - name: Upload artifacts
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: apigee-bundles
        path: target/