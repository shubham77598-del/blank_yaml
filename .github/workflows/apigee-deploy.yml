name: Apigee X Deployment

# Required GitHub Secrets:
# - APIGEE_ORG: Your Apigee organization name 
# - APIGEE_ENV: Target environment (e.g., eval, prod)
# - APIGEE_SA_KEY_JSON or APIGEE_SA_KEY: GCP service account JSON with Apigee admin permissions

on:
  push:
    paths:
      - "designs/**"
      - "src/**"
      - "pom.xml"
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
      APIGEE_ENV: ${{ secrets.APIGEE_ENV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Write Service Account Key
        run: |
            # Support both APIGEE_SA_KEY_JSON and APIGEE_SA_KEY for backwards compatibility
            if [ -n "${{ secrets.APIGEE_SA_KEY_JSON }}" ]; then
              echo "${{ secrets.APIGEE_SA_KEY_JSON }}" > sa.json
            elif [ -n "${{ secrets.APIGEE_SA_KEY }}" ]; then
              echo "${{ secrets.APIGEE_SA_KEY }}" > sa.json
            else
              echo "Error: Neither APIGEE_SA_KEY_JSON nor APIGEE_SA_KEY secret is configured"
              exit 1
            fi
            chmod 600 sa.json

      - name: Generate Apigee Bundles from Design
        run: mvn -q -DcleanGenerated=true compile exec:java -Dexec.mainClass="com.company.design.DesignParser"

      - name: Deploy Shared Flows
        run: |
          if [ -d generated/sharedflows ]; then
            for d in generated/sharedflows/*; do
              [ -d "$d" ] || continue
              echo "::group::SharedFlow $(basename "$d")"
              echo "Deploying shared flow: $(basename "$d")"
              (cd "$d" && mvn -q install \
                  -Dapigee.org=${APIGEE_ORG} \
                  -Dapigee.env=${APIGEE_ENV} \
                  -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
              echo "✅ SharedFlow $(basename "$d") deployed successfully"
              echo "::endgroup::"
            done
          else
            echo "No shared flows to deploy."
          fi

      - name: Deploy Proxies
        run: |
          if [ -d generated/proxies ]; then
            for d in generated/proxies/*; do
              [ -d "$d" ] || continue
              echo "::group::Proxy $(basename "$d")"
              echo "Deploying proxy: $(basename "$d")"
              (cd "$d" && mvn -q install \
                  -Dapigee.org=${APIGEE_ORG} \
                  -Dapigee.env=${APIGEE_ENV} \
                  -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
              echo "✅ Proxy $(basename "$d") deployed successfully"
              echo "::endgroup::"
            done
          else
            echo "No proxies to deploy."
          fi

      - name: Deploy Config (API Products)
        run: |
          if [ -f generated/config/pom.xml ]; then
            echo "::group::Config"
            echo "Deploying API Products and configuration..."
            (cd generated/config && mvn -q install \
                -Dapigee.org=${APIGEE_ORG} \
                -Dapigee.env=${APIGEE_ENV} \
                -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
            echo "✅ Configuration deployed successfully"
            echo "::endgroup::"
          else
            echo "No config module."
          fi

      - name: Verify API Deployments
        run: |
          echo "::group::API Verification"
          ./scripts/test-deployed-apis.sh
          echo "::endgroup::"
        env:
          APIGEE_ORG: ${{ secrets.APIGEE_ORG }}
          APIGEE_ENV: ${{ secrets.APIGEE_ENV }}

      - name: Deployment Summary
        if: always()
        run: |
          echo "🚀 Apigee Deployment Summary"
          echo "================================"
          echo "Organization: ${APIGEE_ORG}"
          echo "Environment: ${APIGEE_ENV}"
          echo "Generated artifacts:"
          
          if [ -d generated/sharedflows ]; then
            echo "📁 Shared Flows:"
            for d in generated/sharedflows/*; do
              [ -d "$d" ] && echo "  - $(basename "$d")"
            done
          fi
          
          if [ -d generated/proxies ]; then
            echo "📁 API Proxies:"
            for d in generated/proxies/*; do
              [ -d "$d" ] && echo "  - $(basename "$d")"
            done
          fi
          
          if [ -f generated/config/pom.xml ]; then
            echo "📁 Configuration: API Products and config deployed"
          fi
          
          echo "================================"
          echo "✅ Deployment and verification completed successfully!"