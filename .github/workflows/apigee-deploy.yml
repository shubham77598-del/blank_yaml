name: Apigee X Design-Driven Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**.yaml'

jobs:
  build-and-deploy-to-apigee:
    runs-on: ubuntu-latest
    environment: apigee
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML Files
        run: yamllint designs/

      - name: Set up JDK for Maven
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.APIGEE_SA_KEY }}'

      - name: Get Google Cloud Access Token
        id: get_token
        run: echo "APIGEE_TOKEN=$(gcloud auth print-access-token)" >> $GITHUB_ENV

      - name: Set Apigee Org and Env for Maven
        run: |
          echo "APIGEE_ORG=${{ secrets.APIGEE_ORG }}" >> $GITHUB_ENV
          echo "APIGEE_ENV=${{ secrets.APIGEE_ENV }}" >> $GITHUB_ENV

      - name: Create Java source directories and parser class
        run: |
          mkdir -p src/main/java/com/example
          cat > src/main/java/com/example/DesignParser.java << 'EOT'
          package com.example;
          
          import org.yaml.snakeyaml.Yaml;
          import java.io.File;
          import java.io.FileInputStream;
          import java.nio.file.Files;
          import java.nio.file.Paths;
          import java.util.Map;
          
          public class DesignParser {
              public static void main(String[] args) {
                  try {
                      System.out.println("Starting YAML design parsing...");
                      
                      // Create target directories
                      Files.createDirectories(Paths.get("target/apiproxies"));
                      Files.createDirectories(Paths.get("target/sharedflows"));
                      
                      // Load and parse all YAML files in the designs directory
                      File designsDir = new File("designs");
                      if (designsDir.exists() && designsDir.isDirectory()) {
                          for (File yamlFile : designsDir.listFiles((dir, name) -> name.endsWith(".yaml"))) {
                              System.out.println("Processing " + yamlFile.getName());
                              
                              Yaml yaml = new Yaml();
                              Map<String, Object> data = yaml.load(new FileInputStream(yamlFile));
                              
                              // Process shared flows first
                              if (data.containsKey("sharedFlows")) {
                                  System.out.println("Found shared flows, processing...");
                                  // In a real implementation, generate shared flow bundles here
                              }
                              
                              // Process proxies second
                              if (data.containsKey("proxies")) {
                                  System.out.println("Found API proxies, processing...");
                                  // In a real implementation, generate API proxy bundles here
                              }
                          }
                      }
                      
                      System.out.println("YAML design parsing completed.");
                  } catch (Exception e) {
                      e.printStackTrace();
                      System.exit(1);
                  }
              }
          }
          EOT

      - name: Create pom.xml file
        run: |
          cat > pom.xml << 'EOT'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                  xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
              <modelVersion>4.0.0</modelVersion>
              <groupId>com.example</groupId>
              <artifactId>apigee-design-automation</artifactId>
              <version>1.0-SNAPSHOT</version>
              <packaging>pom</packaging>
          
              <properties>
                  <project.build.sourceEncoding>UTF-8</project.build.sourceEncoding>
                  <maven.compiler.source>1.8</maven.compiler.source>
                  <maven.compiler.target>1.8</maven.compiler.target>
                  <apigee.deploy.plugin.version>2.3.5</apigee.deploy.plugin.version>
                  <apigee.org>${env.APIGEE_ORG}</apigee.org>
                  <apigee.env>${env.APIGEE_ENV}</apigee.env>
                  <apigee.bearer>${env.APIGEE_TOKEN}</apigee.bearer>
              </properties>
          
              <dependencies>
                  <dependency>
                      <groupId>org.yaml</groupId>
                      <artifactId>snakeyaml</artifactId>
                      <version>2.2</version>
                  </dependency>
              </dependencies>
          
              <build>
                  <plugins>
                      <!-- This plugin runs the custom Java code to parse YAML and generate bundles -->
                      <plugin>
                          <groupId>org.codehaus.mojo</groupId>
                          <artifactId>exec-maven-plugin</artifactId>
                          <version>3.2.0</version>
                          <executions>
                              <execution>
                                  <id>generate-apigee-bundles-from-yaml</id>
                                  <phase>generate-resources</phase>
                                  <goals>
                                      <goal>java</goal>
                                  </goals>
                                  <configuration>
                                      <mainClass>com.example.DesignParser</mainClass>
                                      <cleanupDaemonThreads>false</cleanupDaemonThreads>
                                  </configuration>
                              </execution>
                          </executions>
                      </plugin>
                  </plugins>
              </build>
          </project>
          EOT

      - name: Install Apigee Maven Plugin from GitHub
        run: |
          git clone https://github.com/apigee/apigee-deploy-maven-plugin.git
          cd apigee-deploy-maven-plugin
          mvn install -DskipTests
          cd ..

      - name: Run Maven Clean Install to Process YAML
        run: mvn clean compile exec:java -Dexec.mainClass="com.example.DesignParser"

      - name: Debug Files
        run: |
          echo "Current directory structure:"
          find . -type f -not -path "*/\.*" | sort