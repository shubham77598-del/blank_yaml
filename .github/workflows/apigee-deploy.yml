name: Apigee X Design-Driven Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'designs/**.yaml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint designs/

      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.APIGEE_SA_KEY }}'

      - name: Get Access Token
        id: get_token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "APIGEE_TOKEN=${TOKEN}" >> $GITHUB_ENV

      - name: Set Apigee Org and Env
        run: |
          echo "APIGEE_ORG=${{ secrets.APIGEE_ORG }}" >> $GITHUB_ENV
          echo "APIGEE_ENV=${{ secrets.APIGEE_ENV }}" >> $GITHUB_ENV

      - name: Build and Deploy with Maven
        run: mvn install -P apigee -Dapigee.config.options=update