name: Apigee X Deployment

# Required GitHub Secrets (choose one approach):
# Option 1 - Individual secrets:
#   - APIGEE_ORG: Your Apigee organization name 
#   - APIGEE_ENV: Target environment (e.g., eval, prod)
#   - Service Account Key (one of): APIGEE_SA_KEY_JSON, APIGEE_SA_KEY, or apigee
# Option 2 - Single JSON secret 'apigee':
#   - apigee: JSON containing {"APIGEE_ORG": "...", "APIGEE_ENV": "...", "APIGEE_SA_KEY": "..."}
# Option 3 - Raw service account key:
#   - apigee: Raw GCP service account JSON (with APIGEE_ORG and APIGEE_ENV as separate secrets)

on:
  push:
    paths:
      - "designs/**"
      - "src/**"
      - "pom.xml"
  workflow_dispatch:

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Environment Variables
        run: |
          # Setup environment variables from secrets
          # Priority: individual secrets > apigee JSON secret
          
          if [ -n "${{ secrets.APIGEE_ORG }}" ]; then
            echo "APIGEE_ORG=${{ secrets.APIGEE_ORG }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.apigee }}" ]; then
            # Try to extract APIGEE_ORG from JSON
            APIGEE_ORG=$(echo '${{ secrets.apigee }}' | jq -r '.APIGEE_ORG // empty' 2>/dev/null || true)
            if [ -n "$APIGEE_ORG" ]; then
              echo "APIGEE_ORG=$APIGEE_ORG" >> $GITHUB_ENV
            fi
          fi
          
          if [ -n "${{ secrets.APIGEE_ENV }}" ]; then
            echo "APIGEE_ENV=${{ secrets.APIGEE_ENV }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.apigee }}" ]; then
            # Try to extract APIGEE_ENV from JSON
            APIGEE_ENV=$(echo '${{ secrets.apigee }}' | jq -r '.APIGEE_ENV // empty' 2>/dev/null || true)
            if [ -n "$APIGEE_ENV" ]; then
              echo "APIGEE_ENV=$APIGEE_ENV" >> $GITHUB_ENV
            fi
          fi
          
          # Validate required environment variables are now properly set
          if [ -z "$APIGEE_ORG" ]; then
            echo "Error: APIGEE_ORG not found in secrets or apigee JSON"
            exit 1
          fi
          if [ -z "$APIGEE_ENV" ]; then
            echo "Error: APIGEE_ENV not found in secrets or apigee JSON"  
            exit 1
          fi

      - name: Write Service Account Key
        run: |
            # Support multiple secret configurations
            # Priority: APIGEE_SA_KEY_JSON > APIGEE_SA_KEY > apigee (single secret) > apigee (JSON with APIGEE_SA_KEY)
            if [ -n "${{ secrets.APIGEE_SA_KEY_JSON }}" ]; then
              echo "${{ secrets.APIGEE_SA_KEY_JSON }}" > sa.json
            elif [ -n "${{ secrets.APIGEE_SA_KEY }}" ]; then
              echo "${{ secrets.APIGEE_SA_KEY }}" > sa.json
            elif [ -n "${{ secrets.apigee }}" ]; then
              # Try to parse as JSON first to extract APIGEE_SA_KEY, fallback to treating as raw service account key
              SA_KEY=$(echo '${{ secrets.apigee }}' | jq -r '.APIGEE_SA_KEY // empty' 2>/dev/null || true)
              if [ -n "$SA_KEY" ]; then
                echo "$SA_KEY" > sa.json
              else
                # Use entire secret as service account key
                echo "${{ secrets.apigee }}" > sa.json
              fi
            else
              echo "Error: No service account secret found. Please configure one of:"
              echo "  - APIGEE_SA_KEY_JSON (recommended)"
              echo "  - APIGEE_SA_KEY (legacy)"  
              echo "  - apigee (can be JSON with {APIGEE_SA_KEY, APIGEE_ORG, APIGEE_ENV} or raw service account key)"
              exit 1
            fi
            chmod 600 sa.json

      - name: Generate Apigee Bundles from Design
        run: mvn -q -DcleanGenerated=true compile exec:java -Dexec.mainClass="com.company.design.DesignParser"

      - name: Deploy Shared Flows
        run: |
          if [ -d generated/sharedflows ]; then
            for d in generated/sharedflows/*; do
              [ -d "$d" ] || continue
              echo "::group::SharedFlow $(basename "$d")"
              echo "Deploying shared flow: $(basename "$d")"
              (cd "$d" && mvn -q install \
                  -Dapigee.org=${APIGEE_ORG} \
                  -Dapigee.env=${APIGEE_ENV} \
                  -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
              echo "✅ SharedFlow $(basename "$d") deployed successfully"
              echo "::endgroup::"
            done
          else
            echo "No shared flows to deploy."
          fi

      - name: Deploy Proxies
        run: |
          if [ -d generated/proxies ]; then
            for d in generated/proxies/*; do
              [ -d "$d" ] || continue
              echo "::group::Proxy $(basename "$d")"
              echo "Deploying proxy: $(basename "$d")"
              (cd "$d" && mvn -q install \
                  -Dapigee.org=${APIGEE_ORG} \
                  -Dapigee.env=${APIGEE_ENV} \
                  -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
              echo "✅ Proxy $(basename "$d") deployed successfully"
              echo "::endgroup::"
            done
          else
            echo "No proxies to deploy."
          fi

      - name: Deploy Config (API Products)
        run: |
          if [ -f generated/config/pom.xml ]; then
            echo "::group::Config"
            echo "Deploying API Products and configuration..."
            (cd generated/config && mvn -q install \
                -Dapigee.org=${APIGEE_ORG} \
                -Dapigee.env=${APIGEE_ENV} \
                -DserviceAccountFile=$GITHUB_WORKSPACE/sa.json)
            echo "✅ Configuration deployed successfully"
            echo "::endgroup::"
          else
            echo "No config module."
          fi

      - name: Verify API Deployments
        run: |
          echo "::group::API Verification"
          ./scripts/test-deployed-apis.sh
          echo "::endgroup::"

      - name: Deployment Summary
        if: always()
        run: |
          echo "🚀 Apigee Deployment Summary"
          echo "================================"
          echo "Organization: ${APIGEE_ORG}"
          echo "Environment: ${APIGEE_ENV}"
          echo "Generated artifacts:"
          
          if [ -d generated/sharedflows ]; then
            echo "📁 Shared Flows:"
            for d in generated/sharedflows/*; do
              [ -d "$d" ] && echo "  - $(basename "$d")"
            done
          fi
          
          if [ -d generated/proxies ]; then
            echo "📁 API Proxies:"
            for d in generated/proxies/*; do
              [ -d "$d" ] && echo "  - $(basename "$d")"
            done
          fi
          
          if [ -f generated/config/pom.xml ]; then
            echo "📁 Configuration: API Products and config deployed"
          fi
          
          echo "================================"
          echo "✅ Deployment and verification completed successfully!"